services:
  postgres:
    image: postgres:16
    container_name: ny_open_fvg_postgres
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: ny_open_fvg_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://trading_user:trading_password@postgres:5432/trading_bot
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: sh -c "python scripts/create_tables.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
